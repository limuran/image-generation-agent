name = "image-generation-agent"
main = "src/workers/index.ts"
compatibility_date = "2024-10-01"

# Workers配置
workers_dev = true

# R2 Bucket绑定
# binding: 在代码中通过 env.IMAGE_STORAGE 访问R2存储桶
# bucket_name: 实际的R2存储桶名称
[[r2_buckets]]
binding = "IMAGE_STORAGE"
bucket_name = "image-agent-storage"

# 环境变量
[vars]
NODE_ENV = "production"
R2_PUBLIC_URL = "https://你的R2公开URL"  # 替换为实际URL

# 密钥配置 (通过 wrangler secret put 命令添加)
# wrangler secret put MOONSHOT_API_KEY
# wrangler secret put OPENAI_API_KEY