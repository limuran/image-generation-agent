name = "image-generation-agent"
# ⚠️ 重要：替换为你的 Cloudflare 账号 ID
account_id = "85cff694f5f5b50f3d927558217bdad7"

main = "workers/index.ts"
compatibility_date = "2025-08-13"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ============================================
# D1 Database 绑定（生产环境）
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "image-agent-db"
database_id = "63f5556e-6c22-4374-a1aa-a735080e1f63"

# ============================================
# 本地开发环境配置
# ============================================
# 本地开发时，Wrangler 会自动创建本地 D1 数据库
# 数据存储在 .wrangler/state/v3/d1/ 目录
# 首次运行时需要应用 schema：
# wrangler d1 execute image-agent-db --local --file=migrations/0001_initial_schema.sql

# ============================================
# R2 Bucket 绑定
# ============================================
[[r2_buckets]]
binding = "IMAGE_STORAGE"
bucket_name = "image-agent-storage"

# ============================================
# 环境变量
# ⚠️ 重要：将 R2_PUBLIC_URL 替换为你的实际 R2 公开域名
# 获取方式：Cloudflare Dashboard > R2 > 你的 bucket > Settings > Public Access
# 格式：https://pub-xxxxx.r2.dev 或自定义域名
# ============================================
[vars]
NODE_ENV = "production"
R2_PUBLIC_URL = "https://pub-386731fd88bd4ce79043ea68d15bd5fe.r2.dev"